  <style>
    :root { --ink: #0f1117; --ink-soft: #3a3d4a; --accent: #1a56db; --accent-warm: #c2410c; --surface: #f8f7f4; --card: #ffffff; --border: #e4e1da; --tag-bg: #eef2ff; --tag-color: #3730a3; }

    .nav-links a { text-decoration: none; color: var(--ink-soft); font-size: 0.875rem; font-weight: 500; padding-bottom: 2px; border-bottom: 2px solid transparent; transition: color 0.2s, border-color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--accent); border-bottom-color: var(--accent); }
    .page-hero { max-width: 1100px; margin: 0 auto; padding: 4rem clamp(1.5rem,5vw,4rem) 2rem; display: flex; justify-content: space-between; align-items: flex-end; flex-wrap: wrap; gap: 1.5rem; }
    .section-label { font-family: 'DM Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent-warm); margin-bottom: 0.5rem; }
    h1 { font-family: 'DM Serif Display', serif; font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 0.75rem; }
    .btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.65rem 1.25rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; text-decoration: none; transition: all 0.2s; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1447c7; }
    section { max-width: 1100px; margin: 0 auto; padding: 2rem clamp(1.5rem,5vw,4rem); }
    .divider { height: 1px; background: var(--border); margin: 0 clamp(1.5rem,5vw,4rem); }
    h2 { font-family: 'DM Serif Display', serif; font-size: 1.5rem; margin-bottom: 1.25rem; }
    .embed-wrap { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    iframe { display: block; width: 100%; border: none; }
    footer { background: var(--ink); color: #9ca3af; text-align: center; padding: 2rem; font-size: 0.875rem; margin-top: 4rem; }
    footer a { color: #c7d2fe; text-decoration: none; }
    @media (max-width: 640px) { .nav-links { gap: 1rem; } .nav-links a { font-size: 0.78rem; } }
